name: Feature request
description: Propose a product or platform improvement
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: dropdown
    id: brand
    attributes:
      label: Brand or area
      options: [VanAssist, TowSmart, TrailerWise, LocalTorque, Shared platform, Admin, Infrastructure]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: User or business problem
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome and acceptance criteria
    validations:
      required: true
  - type: dropdown
    id: workstream
    attributes:
      label: Owning workstream
      options: [Platform, Experience, Brands, Data, Infrastructure, Operations, Commercial]
    validations:
      required: true
  - type: textarea
    id: charter
    attributes:
      label: Platform Charter and Quality Gate impact
      description: Explain UX, platform, brand, commercial, maintainability and release-gate effects.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Data, security, cost or compatibility considerations

